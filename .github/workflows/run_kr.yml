name: Run KR Crawlers

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create folders
        run: |
          mkdir -p data
          mkdir -p logs

      - name: Create Firebase key
        run: |
          echo '${{ secrets.FIREBASE_KEY }}' > serviceAccountKey.json

      - name: Run GundamBase crawler
        run: python sync_kr_gundambase.py

      - name: Run GundamShop crawler
        run: python sync_kr_gundamshop.py

      - name: Run BNKRMALL crawler
        run: python sync_kr_bnkrmall.py

      - name: Run merge
        run: python merge_kr_crosscheck.py

      - name: Commit updated data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "Auto update KR data"
          git push
