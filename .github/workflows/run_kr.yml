name: KR Gundam Sync

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create serviceAccountKey.json
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > serviceAccountKey.json

      - name: Run KR integrated crawler
        env:
          FIRESTORE_COLLECTION: aggregated_items
        run: |
          python merge_kr_crosscheck.py

      - name: Upload local debug backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kr-aggregated-debug
          path: kr_aggregated_debug.json
