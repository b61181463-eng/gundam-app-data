name: Run KR Gundam Crawler

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      FAST_TEST_MODE: "0"
      MAX_LINKS_PER_SITE: "9999"
      MIN_TOTAL_UPLOAD: "250"
      ABSOLUTE_MIN_UPLOAD: "250"
      FORCE_UPLOAD_LOW_COUNT: "0"
      ALLOW_TEST_UPLOAD: "0"
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install beautifulsoup4 requests firebase-admin selenium webdriver-manager

      - name: Create Firebase service account key
        run: |
          python - <<'PY'
          import os, pathlib
          raw = os.environ.get("FIREBASE_SERVICE_ACCOUNT_JSON", "")
          if not raw:
              raise SystemExit("FIREBASE_SERVICE_ACCOUNT_JSON secret is empty")
          pathlib.Path("serviceAccountKey.json").write_text(raw, encoding="utf-8")
          PY

      - name: Run KR crawler
        run: python merge_kr_crosscheck.py

      - name: Upload crawler artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawler-artifacts
          path: |
            kr_aggregated_debug.json
            match_report.json
            failed_links_report.json
            crawler_health_history.json
            backups/**
          if-no-files-found: ignore
